# annotation.py — Hydra configuration
# Override from CLI: python annotation_v11.py layers.roads.enabled=true
# ──────────────────────────────────────────────────────────────────────────

data:
  image_path: "./input/PEC/May10/LANDUSE_corrected.tif"   # path to PNG/JPG/GeoTIFF
  gpkg_path:  ""       # path to GeoPackage (.gpkg/.shp/.geojson)
  layer:      ""       # GPKG layer name (empty = first layer)
  N:          30             # grid size N×N

layers:
  elevation:
    enabled:   true
    path:      ""   # e.g. "./input/PEC/ELEVATION_corrected.tif"
    alpha:     0.35
    colormap:  "plasma"
  roads:
    enabled:   false
    path:      ""   # e.g. "./input/PEC/ROADS_corrected.gpkg"
    alpha:     0.65
    color:     "#e63946"
    linewidth: 1.6
  cadastral:
    enabled:   false
    path:      ""      # path to cadastral shapefile/GPKG
    alpha:     0.5
    color:     "#f4a261"
    facecolor: "#f4a26118"
    linewidth: 0.8
  hydrology:
    enabled:   false
    path:      ""      # path to shapefile/GPKG (empty = fetch waterways from OSM)
    alpha:     0.65
    color:     "#4cc9f0"
    linewidth: 1.4

cost:
  default_cost: 100.0    # € per cell applied to CLASS_RA cells with no cost
  auto_fill:    true     # fill missing costs automatically on export
  # Slope-based accessibility filter applied at export time.
  # Cells where the 75th-percentile terrain slope (computed at native DEM
  # resolution, aggregated per planning unit) exceeds max_slope_deg are
  # marked inaccessible regardless of road-network proximity.
  max_slope_deg: 30.0    # degrees; set to .inf to disable

ui:
  canvas_size:        800
  max_zoom:           30.0
  pan_key_step:       40
  auto_hab_threshold: 0.95
  auto_label_threshold: 50
  panel_width:        400

output:
  folder: ""
  prefix: "annotation"
  dpi:    150
