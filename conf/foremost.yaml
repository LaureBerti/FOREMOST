# foremost — Hydra configuration
# Override any field via CLI:  python foremost.py optimizer.algo=CTAEA
# ─────────────────────────────────────────────────────────────────────────

# Run mode: 0=synthetic, 1=load .npy arrays (default), 2=annotator GUI
mode: 1

data:
  mode:             1         # 0=synthetic | 1=npy folder | 2=annotator GUI
  seed_gen:         7
  nrows:            30
  ncols:            30
  habitat_fraction: 0.28
  cell_area:        1.0
  image_path:       ""
  gpkg_path:        ""
  # mode=1: folder containing land_use_classify_{habitat,restorable,accessible,cost}_N*.npy
  npy_folder:       "outputs/"
  # mode=0 raster paths (leave empty to use synthetic data)
  habitat_path:     ""
  restorable_path:  ""
  accessible_path:  ""
  cost_path:        ""
  locked_out_path:  ""
  elevation_path:   "input/PEC/ELEVATION_corrected.tif"
  # CRS / extent of the study area (EPSG:3857).
  # Used to compute sq_bounds and cell_size_m when running in mode=1.
  # PEC: Width=319 703 m, Height=664 415 m → square side = 664 415 m.
  working_crs:      "EPSG:3857"

cost:
  tree_unit_cost:          30.0   # € per tree
  tree_spacing_m:          2.0    # metres between trees (planting density)
  # cell_size_m MUST equal landscape_sq_extent_m / N for real raster runs.
  # Wrong value → wrong n_trees per cell and wrong slope gradient (NC5).
  #   PEC N= 30: 664415 /  30 ≈ 22147 m  → cell_size_m: 22147.0
  #   PEC N= 60: 664415 /  60 ≈ 11074 m  → cell_size_m: 11074.0
  #   PEC N=133: 664415 / 133 ≈  4996 m  → cell_size_m:  4996.0
  # Default 100.0 is correct ONLY for synthetic mode=0.
  cell_size_m:             100.0
  inaccessible_surcharge:  0.4    # +40 % cost for road-inaccessible cells
  elevation_base_m:        0.0    # reference elevation (m); no penalty below this
  elevation_slope:         0.005  # fractional cost increase per metre of elevation
  noise_sigma:             0.05   # multiplicative cost noise σ

constraints:
  # All spatial constraints in CELL units — NOT metres.
  # Recalibrate whenever N changes: physical_size_m = constraint_cells × cell_size_m.
  #
  # PEC at N=30 (cell=22 km): min/max_restore are sums of restorable[] values (not cell counts).
  # PEC at N=133 (cell=5 km): max_diameter=2 → 10 km corridor; iic_max_dist=4 → 20 km dispersal.
  min_restore: 10.0    # sum of restorable[] values of selected cells (not cell count)
  max_restore: 200.0   # upper bound — bounded by n_candidates at runtime
  max_diameter: 10     # max spatial diameter of restored zone in CELLS
  max_nb_cc: 20        # max connected components
  min_proportion: 0.0
  max_cost: 20000      # EUR budget cap
  min_app_compliance: 0.0   # NC6: fraction of restored cells in APPs (0.0=disabled)
  max_slope_deg: 30.0       # NC5: max terrain slope (degrees); matches slope-filter in annotation export
  min_patch_size: 0         # NC1: min cells per connected component (0=disabled)
  max_edge_ratio: 1.0       # NC2: max edge-to-area ratio (1.0=disabled)
  min_iic_delta: 0.0        # NC3: min IIC improvement above baseline (0.0=disabled)
  max_distance_to_habitat: 0  # NC4: max Chebyshev distance to habitat (0=disabled)
  min_carbon_stock: 0.0     # NC7: min tCO2 over horizon (0.0=disabled)
  carbon_rate_tco2_ha_yr: 3.0  # NC7: tCO2/ha/yr (Atlantic Forest default)
  carbon_horizon_yr: 20     # NC7: accounting horizon (years)
  min_corridor_width: 0     # NC8: min corridor width in cells (0=disabled)

optimizer:
  # algo: GA | NSGA2 | NSGA3 | CTAEA | RNSGA3
  algo:         NSGA2
  # objective: MESH | IIC | COST | MESH_IIC | MESH_COST | IIC_COST | FULL
  objective:    FULL
  pop_size:     80
  n_gen:        120
  seed:         42
  verbose:      true
  iic_max_dist: 10
  penalty:      1000000.0
  pop_per_ref_point: 50
  mu:      0.1

output:
  dir:    "outputs"
  prefix: "foremost"
  dpi:    150
  show:   false
  fig_saved: true
