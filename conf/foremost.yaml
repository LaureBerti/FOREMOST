# foremost — Hydra configuration
# Override any field via CLI:  python foremost.py optimizer.algo=CTAEA
# ─────────────────────────────────────────────────────────────────────────

data:
  nrows:            20
  ncols:            20
  habitat_fraction: 0.2
  restorable_fraction: 0.9
  accessible_fraction: 1
  cell_area:        1.0
  seed:             7
  # Leave paths empty to use synthetic / computed data
  habitat_path:     ""
  restorable_path:  ""
  accessible_path:  ""
  cost_path:        ""   # leave empty → uses compute_restoration_cost()
  locked_out_path:  ""
  elevation_path:   ""   # optional DEM raster

cost:
  tree_unit_cost:          30.0   # € per tree
  tree_spacing_m:          2.0   # metres between trees
  cell_size_m:             100.0      # cell side length in metres
  inaccessible_surcharge:  0.4
  elevation_base_m:        0.0
  elevation_slope:         0.005  # extra cost / metre elevation
  noise_sigma:             0.05

constraints:
  min_restore:    20.0
  max_restore:    100.0
  max_diameter:   9
  max_nb_cc:      10
  min_proportion: 0.0
  max_cost:       20000

optimizer:
  # algo: GA | NSGA2 | NSGA3 | CTAEA | RNSGA3
  algo:         NSGA2
  # objective: MESH | IIC | COST | MESH_IIC | MESH_COST | IIC_COST | FULL
  objective:    FULL
  pop_size:     100
  n_gen:        100
  seed:         42
  verbose:      true
  iic_max_dist: 10
  penalty:      1e6
  pop_per_ref_point:  50
  mu: 0.1

output:
  dir:    "outputs"
  prefix: "foremost"
  dpi:    150
  show:   false
